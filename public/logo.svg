<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c026d3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- T letter stylized -->
  <g fill="white">
    <!-- Top bar of T -->
    <rect x="120" y="120" width="272" height="52" rx="8"/>
    <!-- Vertical bar of T -->
    <rect x="230" y="120" width="52" height="280" rx="8"/>
    <!-- Decorative elements -->
    <rect x="140" y="180" width="40" height="40" rx="6" opacity="0.9"/>
    <rect x="332" y="180" width="40" height="40" rx="6" opacity="0.9"/>
    <rect x="140" y="228" width="40" height="40" rx="6" opacity="0.7"/>
    <rect x="332" y="300" width="40" height="40" rx="6" opacity="0.7"/>
  </g>
</svg>
